name: 🎉 iOS Build Camelia

on:
  push:
    branches: [ "main", "ios" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ios:
    name: 🎉 iOS Build & Release
    runs-on: macos-latest
    
    steps:
      - name: 📂 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠 Configuration Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true 

      - name: 📦 Installation des dépendances Flutter
        run: flutter pub get

      - name: 🔍 Vérification du fichier Firebase (Crucial pour l'écran blanc)
        run: |
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "ERREUR : Le fichier GoogleService-Info.plist est absent de ios/Runner/"
            exit 1
          fi

      - name: ⚙️ Installation CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: 🏗 Compilation iOS (No Codesign)
        
        run: flutter build ios --release --no-codesign

      - name: 📦 Création du fichier .ipa pour test
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r ../../../FlutterIpaExport.ipa Payload
          
      - name: 📤 Archivage de l'artefact (Pour téléchargement direct)
        uses: actions/upload-artifact@v4
        with:
          name: camelia-ios-debug
          path: FlutterIpaExport.ipa

      - name: 🚀 Mise en ligne sur GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FlutterIpaExport.ipa
          tag: v1.0.${{ github.run_number }}
          overwrite: true
          body: "Build automatique de Camelia Logistics - Version iOS de test"
